<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Page ── */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: system-ui, -apple-system, sans-serif;
      color: #f1f5f9;
      padding: 2rem;
    }

    /* ── Card ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 3rem 4rem;
      text-align: center;
      max-width: 520px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }

    /* ── Emoji ── */
    .emoji {
      font-size: 5rem;
      margin-bottom: 1.2rem;
      display: block;
      animation: wave 2s ease-in-out infinite;
    }

    /* ── Heading ── */
    h1 {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
      letter-spacing: -1px;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* ── Pipeline badge ── */
    .pipeline-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0f3460;
      color: #38bdf8;
      border: 1px solid #1d4ed8;
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }
    .dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ── Steps ── */
    .steps {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 0.5rem;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #64748b;
    }
    .step-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #0f172a;
      border: 1px solid #334155;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .step.done .step-icon { border-color: #22c55e; background: #052e16; }
    .step.done { color: #86efac; }
    .step-line {
      width: 40px; height: 1px;
      background: #334155;
      margin-top: 18px;
    }
    .step-line.done { background: #22c55e; }

    /* ── Footer ── */
    .footer {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: #475569;
    }
    .footer span { color: #38bdf8; }

    /* ── Animations ── */
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(20deg); }
      75% { transform: rotate(-10deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">

    <span class="emoji">👋</span>
    <h1>Hello, World!</h1>
    <p class="subtitle">
      This page was automatically built and deployed<br>
      using a <strong style="color:#818cf8">GitHub Actions CI/CD pipeline</strong>.
    </p>

    <div class="pipeline-badge">
      <span class="dot"></span>
      Pipeline passed · Deployed successfully
    </div>

    <!-- Pipeline steps indicator -->
    <div class="steps">
      <div class="step done">
        <div class="step-icon">📝</div>
        <span>Code</span>
      </div>
      <div class="step-line done"></div>
      <div class="step done">
        <div class="step-icon">🔨</div>
        <span>Build</span>
      </div>
      <div class="step-line done"></div>
      <div class="step done">
        <div class="step-icon">✅</div>
        <span>Test</span>
      </div>
      <div class="step-line done"></div>
      <div class="step done">
        <div class="step-icon">🚀</div>
        <span>Deploy</span>
      </div>
      <div class="step-line done"></div>
      <div class="step done">
        <div class="step-icon">🌐</div>
        <span>Live</span>
      </div>
    </div>

    <div class="footer">
      Deployed via GitHub Actions &nbsp;·&nbsp;
      <span id="time"></span>
    </div>

  </div>

  <script>
    // Show current time
    const t = new Date();
    document.getElementById('time').textContent =
      t.toLocaleDateString('en-US', { day:'numeric', month:'short', year:'numeric' }) +
      ' at ' + t.toLocaleTimeString();
  </script>
</body>
</html>
