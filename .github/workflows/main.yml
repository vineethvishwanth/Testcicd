# ============================================================
#  CI/CD Pipeline — Hello World → GitHub Pages
#  Trigger : push to main  →  build  →  deploy  →  live
# ============================================================

name: 🌐 Deploy Hello World

on:
  push:
    branches: [ "main" ]        # auto-deploy every time you push to main
  pull_request:
    branches: [ "main" ]        # run build check on pull requests (no deploy)
  workflow_dispatch:             # lets you trigger manually from GitHub UI

# ── Permissions required for GitHub Pages deployment ─────────
permissions:
  contents: read
  pages:    write
  id-token: write

# ── Only one deployment runs at a time ───────────────────────
concurrency:
  group: "pages"
  cancel-in-progress: false

# ============================================================
jobs:

  # ── JOB 1 · Build ─────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Download your source code
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # Step 2 — Make sure index.html exists (basic validation)
      - name: 🔍 Validate site files
        run: |
          echo "📂 Files in repo:"
          ls -la
          if [ ! -f index.html ]; then
            echo "❌ ERROR: index.html not found!"
            exit 1
          fi
          echo "✅ index.html found — ready to deploy!"

      # Step 3 — Package site files for GitHub Pages
      - name: 📦 Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."               # deploy everything at the root of the repo

  # ── JOB 2 · Deploy ────────────────────────────────────────
  # Runs only when code is pushed to main (not on pull requests)
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}   # ← your live URL appears here

    steps:
      - name: 🚀 Publish to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
